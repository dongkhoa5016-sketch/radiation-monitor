<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Giám Sát Phóng Xạ Thời Gian Thực</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background-color: #1e293b;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-sub);
        }

        /* Khối bộ lọc button */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            background-color: var(--bg-card);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .btn {
            background: transparent;
            color: var(--text-sub);
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn.active {
            background-color: var(--primary);
            color: #ffffff;
        }

        .btn-action {
            background-color: var(--success);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action:hover {
            background-color: #059669;
        }

        /* Grid hiển thị các thông số thẻ */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--primary);
        }

        .card.cps::before { background-color: #3b82f6; }
        .card.cpm::before { background-color: #6366f1; }
        .card.dose::before { background-color: #ef4444; }
        .card.total::before { background-color: #f59e0b; }
        .card.weather::before { background-color: #10b981; }

        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-sub {
            font-size: 11px;
            color: var(--text-sub);
        }

        /* Khối Đồ thị */
        .chart-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            height: 520px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Trạng thái hệ thống phía dưới */
        #sync-status {
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .warning-text {
            color: var(--warning);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid from fa-radiation"></i> Hệ Thống Giám Sát Phóng Xạ Thời Gian Thực</h1>
        <div class="status-badge" id="device-id">Thiết bị: Đang kiểm tra...</div>
    </header>

    <div class="control-panel">
        <div class="filter-group">
            <button class="btn active" onclick="setHourFilter(1, this)"><i class="fa-solid fa-clock"></i> 1 Giờ</button>
            <button class="btn" onclick="setHourFilter(4, this)"><i class="fa-solid fa-clock"></i> 4 Giờ</button>
            <button class="btn" onclick="setFilter(1, this)"><i class="fa-solid fa-calendar-day"></i> 1 Ngày</button>
            <button class="btn" onclick="setFilter(7, this)"><i class="fa-solid fa-calendar-week"></i> 7 Ngày</button>
            <button class="btn" onclick="setFilter(30, this)"><i class="fa-solid fa-calendar-days"></i> 30 Ngày</button>
            <button class="btn" onclick="fetchData()"><i class="fa-solid fa-rotate"></i> Tải lại</button>
        </div>
        <button class="btn-action" onclick="exportToCSV()"><i class="fa-solid fa-file-csv"></i> Xuất File Báo Cáo CSV</button>
    </div>

    <div class="metrics-grid">
        <div class="card cps">
            <div class="card-title">Tốc độ đếm (CPS)</div>
            <div class="card-value" id="val-cps">--</div>
            <div class="card-sub" id="max-cps">Mức Max: --</div>
        </div>
        <div class="card cpm">
            <div class="card-title">Suất đếm (CPM)</div>
            <div class="card-value" id="val-cpm">--</div>
            <div class="card-sub" id="max-cpm">Mức Max: --</div>
        </div>
        <div class="card dose">
            <div class="card-title">Suất liều lượng</div>
            <div class="card-value" id="val-dose">--</div>
            <div class="card-sub" id="max-dose">Mức Max: -- µSv/h</div>
        </div>
        <div class="card total">
            <div class="card-title">Tổng số đếm</div>
            <div class="card-value" id="val-total">--</div>
            <div class="card-sub">xung tích lũy</div>
        </div>
        <div class="card weather">
            <div class="card-title">Nhiệt độ / Độ ẩm</div>
            <div class="card-value" style="font-size: 22px; margin-top: 6px;" id="val-weather">--°C / --%</div>
            <div class="card-sub" id="val-dht-status">Trạng thái: --</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="radiationChart"></canvas>
    </div>

    <div id="sync-status"><i class="fa-solid fa-circle-notch fa-spin"></i> Đang thiết lập liên kết với AWS đám mây...</div>
</div>

<script>
    // ============== CẤU HÌNH ĐƯỜNG DẪN API GATEWAY CỦA BẠN ==============
    const API_URL = "https://ql4drki257.execute-api.ap-southeast-2.amazonaws.com/prod/latest";
    // ====================================================================

    let currentUrlParams = "?hours=1"; 
    let autoRefreshTimer = null;
    let globalRawData = []; 
    let chartInstance = null;

    // Khởi tạo đồ thị Chart.js khi vừa tải trang
    function initChart() {
        const ctx = document.getElementById('radiationChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'CPS Tức thời', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, yAxisID: 'y-cps', pointRadius: 1, tension: 0.1 },
                    { label: 'CPM Tức thời', data: [], borderColor: '#6366f1', backgroundColor: 'transparent', borderWidth: 1.5, yAxisID: 'y-cpm', pointRadius: 0, tension: 0.1 },
                    { label: 'Suất Liều (µSv/h)', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.05)', borderWidth: 2, yAxisID: 'y-dose', pointRadius: 1, tension: 0.1 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { labels: { color: '#f8fafc' } }
                },
                scales: {
                    x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', maxTicksLimit: 12 } },
                    'y-cps': { type: 'linear', display: true, position: 'left', grid: { color: '#334155' }, ticks: { color: '#3b82f6' }, title: { display: true, text: 'Mức đếm (CPS)', color: '#3b82f6' } },
                    'y-cpm': { type: 'linear', display: false, position: 'left' },
                    'y-dose': { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#ef4444' }, title: { display: true, text: 'Liều lượng (µSv/h)', color: '#ef4444' } }
                }
            }
        });
    }

    // Hàm lõi bốc dữ liệu từ AWS đám mây
    async function fetchData() {
        try {
            const response = await fetch(`${API_URL}${currentUrlParams}`);
            const result = await response.json();
            
            if (result.success && result.allData) {
                globalRawData = result.allData;
                
                if (globalRawData.length > 0) {
                    const latest = globalRawData[globalRawData.length - 1];
                    
                    // Cập nhật mã trạm thiết bị
                    document.getElementById('device-id').innerText = `Thiết bị: ${latest.connectionId || 'N/A'}`;
                    
                    // Điền dữ liệu tức thời vào các ô số lớn
                    document.getElementById('val-cps').innerText = latest.cps_i ?? 0;
                    document.getElementById('val-cpm').innerText = latest.cpm_i ?? 0;
                    document.getElementById('val-dose').innerText = latest.dose_i ?? 0;
                    document.getElementById('val-total').innerText = latest.total_counts ?? 0;
                    
                    // Hiển thị giá trị đỉnh lớn nhất an toàn (Không bị chia lặp trung bình)
                    document.getElementById('max-cps').innerText = `Mức Max: ${latest.cps_avg ?? 0}`;
                    document.getElementById('max-cpm').innerText = `Mức Max: ${latest.cpm_avg ?? 0}`;
                    document.getElementById('max-dose').innerText = `Mức Max: ${latest.dose_avg ?? 0} µSv/h`;
                    
                    // Cập nhật cảm biến DHT môi trường
                    if (latest.dht_error || latest.temperature == null) {
                        document.getElementById('val-weather').innerText = "LỖI / LỖI";
                        document.getElementById('val-dht-status').innerHTML = "<span style='color:#ef4444;'>Cảm biến ngắt kết nối</span>";
                    } else {
                        document.getElementById('val-weather').innerText = `${latest.temperature}°C / ${latest.humidity}%`;
                        document.getElementById('val-dht-status').innerHTML = "<span style='color:#10b981;'>Hoạt động tốt</span>";
                    }
                }

                // Chuyển đổi Timestamp sang định dạng giờ Việt Nam hiển thị trục X
                const newLabels = globalRawData.map(item => {
                    const d = new Date(Number(item.timestamp) * 1000);
                    return d.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                });

                // Cập nhật dữ liệu vào mảng vẽ đồ thị
                chartInstance.data.labels = newLabels;
                chartInstance.data.datasets[0].data = globalRawData.map(d => d.cps_i);
                chartInstance.data.datasets[1].data = globalRawData.map(d => d.cpm_i);
                chartInstance.data.datasets[2].data = globalRawData.map(d => d.dose_i);
                chartInstance.update('none'); // Update mượt không tạo hiệu ứng giật mắt

                // Cập nhật dòng trạng thái báo cáo dưới đáy trang
                let statusTxt = `<i class="fa-solid fa-circle-check" style="color:#10b981;"></i> Bộ lọc: [${result.filter}] - Nhận về: ${result.count} điểm dữ liệu phổ.`;
                if (result.downsampled) {
                    statusTxt += ` <span class="warning-text">(Đã kích hoạt chế độ nén GIỮ ĐỈNH nâng cao từ ${result.rawCount} bản ghi thô để tránh lag mạng)</span>`;
                }
                document.getElementById('sync-status').innerHTML = statusTxt;
            }
        } catch (error) {
            console.error(error);
            document.getElementById('sync-status').innerHTML = "<span style='color: #ef4444;'><i class='fa-solid fa-circle-exclamation'></i> Lỗi kết nối API Gateway hoặc Lambda AWS sập.</span>";
        }
    }

    // Cơ chế bấm lọc xem theo GIỜ (Tự động cập nhật liên tục 5s/lần vì dữ liệu nhẹ, cần xem realtime số nhảy)
    function setHourFilter(hours, element) {
        currentUrlParams = `?hours=${hours}`;
        updateActiveButton(element);
        fetchData();
        
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(fetchData, 5000); 
    }

    // Cơ chế bấm lọc xem theo NGÀY (Tắt tự động cập nhật đi để bảo vệ CPU máy không bị lag đơ)
    function setFilter(days, element) {
        currentUrlParams = `?days=${days}`;
        updateActiveButton(element);
        fetchData();
        
        clearInterval(autoRefreshTimer); // Tắt tải liên tục, muốn xem dữ liệu mới nhất thì ấn nút "Tải lại"
    }

    function updateActiveButton(element) {
        document.querySelectorAll('.filter-group .btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }

    // Hàm xuất dữ liệu ra file báo cáo dạng CSV chuẩn xác, không sai lệch đỉnh
    function exportToCSV() {
        if (globalRawData.length === 0) {
            alert("Không có dữ liệu để xuất file báo cáo!");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "Thời gian,Mã thiết bị,CPS Tức thời,CPM Tức thời,Suất liều (uSv/h),CPS Đỉnh tối đa,CPM Đỉnh tối đa,Suất liều Đỉnh tối đa,Tổng số xung,Nhiệt độ (C),Độ ẩm (%),Lỗi cảm biến DHT\n";

        globalRawData.forEach(item => {
            const date = new Date(Number(item.timestamp) * 1000);
            const timeStr = date.toLocaleString('vi-VN').replace(/,/g, '');
            
            const row = [
                timeStr,
                item.connectionId || '',
                item.cps_i ?? '',
                item.cpm_i ?? '',
                item.dose_i ?? '',
                item.cps_avg ?? '', // Cột dữ liệu Max cao nhất trong chu kỳ đo
                item.cpm_avg ?? '', 
                item.dose_avg ?? '', 
                item.total_counts ?? '',
                item.temperature ?? '',
                item.humidity ?? '',
                item.dht_error ? "LỖI" : "OK"
            ].join(",");
            csvContent += row + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Bao_Cao_Phong_Xa_${Math.floor(Date.now()/1000)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Tiến trình chạy khởi động khi vừa bật trang web
    window.onload = () => {
        initChart();
        // Mặc định ban đầu vừa mở trang web sẽ xem 1 Giờ và kích hoạt vòng lặp nhảy số liên tục
        setHourFilter(1, document.querySelector('.filter-group .btn'));
    };
</script>

</body>
</html>
